version: "3.9"

# Common configuration shared by all Airflow services
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # FIX: Resolves the "Failed to resolve hostname" error in logs
    AIRFLOW__CORE__HOSTNAME_CALLABLE: 'airflow.utils.net:get_host_ip_address'
    # ETL Database Credentials (passed to your Python scripts)
    DB_HOST: mysql
    DB_PORT: "3306"
    DB_USER: etl_user
    DB_PASSWORD: etl_password
    DB_NAME: university_db
  volumes:
  - ./dags:/opt/airflow/dags
  # Mount application code so Airflow can import `src.*` modules
  - ./src:/opt/airflow/src
  - ./logs:/opt/airflow/logs
  - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # 1. Metadata Database (Internal Airflow state)
  postgres:
    image: postgres:15-alpine
    container_name: university_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. University Data Database (Your ETL target)
  mysql:
    image: mysql:8.0
    container_name: university_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: university_db
      MYSQL_USER: etl_user
      MYSQL_PASSWORD: etl_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Environment Initializer (Runs once to setup DB and Admin)
  airflow-init:
    <<: *airflow-common
    container_name: university_airflow_init
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.org 2>/dev/null || true
      "

  # 4. Airflow Webserver (UI)
  airflow-webserver:
    <<: *airflow-common
    container_name: university_airflow_webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8793:8793" # Expose log port
    command: airflow webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy

  # 5. Airflow Scheduler (The Brain)
  airflow-scheduler:
    <<: *airflow-common
    container_name: university_airflow_scheduler
    restart: unless-stopped
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy

volumes:
  postgres_data:
  mysql_data: